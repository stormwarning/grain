<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>grain — banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Plus+Jakarta+Sans:wght@500;600;700&display=block" rel="stylesheet" />
<style>
  :root {
    --bg-root: #080b12;
    --bg-surface: #0f1419;
    --grain: #85a1ff;
    --text: #e2e8f0;
    --text-muted: #64748b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-root);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    width: 1500px;
    height: 500px;
    position: relative;
    background-image:
      radial-gradient(ellipse 900px 500px at 92% -10%, rgba(133, 161, 255, 0.14), transparent 60%),
      radial-gradient(ellipse 700px 400px at 4% 110%, rgba(107, 139, 239, 0.08), transparent 60%);
  }

  .stage {
    width: 100%;
    height: 100%;
    position: relative;
    padding: 36px 60px;
  }

  /* ─── Cards ───────────────────────────────── */

  .card {
    position: absolute;
    background: #ffffff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 28px 56px -14px rgba(0, 0, 0, 0.7),
      0 6px 18px -6px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.06);
    color: #171717;
    transform: rotate(var(--rot, 0deg));
  }
  .card-photo {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #161d27;
  }
  .card-foot {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    background: #ffffff;
  }
  .card-foot .avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    object-fit: cover;
    background: #e5e7eb;
    flex-shrink: 0;
  }
  .card-text {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 700;
    color: #171717;
    letter-spacing: -0.005em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-handle {
    font-size: 9.5px;
    color: #525252;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-actions {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-shrink: 0;
    color: #525252;
  }
  .card-actions svg {
    width: 14px;
    height: 14px;
    stroke-width: 2;
  }

  /* Five cards across, varied Y + rotation, all footers visible */
  .card-1 {
    top: 50px;
    left: 2%;
    width: 200px;
    --rot: -7deg;
    z-index: 1;
  }
  .card-1 .card-photo { aspect-ratio: 2/3; }

  .card-2 {
    top: 12px;
    left: 19%;
    width: 234px;
    --rot: 3deg;
    z-index: 2;
  }
  .card-2 .card-photo { aspect-ratio: 4/3; }

  .card-3 {
    top: 46px;
    left: 38%;
    width: 208px;
    --rot: -3deg;
    z-index: 3;
  }
  .card-3 .card-photo { aspect-ratio: 3/4; }

  .card-4 {
    top: 22px;
    left: 56%;
    width: 200px;
    --rot: 5deg;
    z-index: 4;
  }
  .card-4 .card-photo { aspect-ratio: 3/4; }

  .card-5 {
    top: 60px;
    right: 2%;
    width: 230px;
    --rot: -4deg;
    z-index: 5;
  }
  .card-5 .card-photo { aspect-ratio: 4/3; }
</style>
</head>
